name: Bump peek cask

# Three triggers:
#   1. repository_dispatch (peek-released)  — fastest; fired by peek's
#      release workflow seconds after a tag is published. Requires a PAT
#      on the peek side (HOMEBREW_TAP_TOKEN) with write access here.
#   2. schedule (every 6 hours)              — fallback; polls GitHub
#      releases and bumps if peek has moved ahead of the pinned version.
#   3. workflow_dispatch                     — manual backfill / retry.

on:
  repository_dispatch:
    types: [peek-released]
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:
    inputs:
      version:
        description: "peek version without the leading v, e.g. 0.4.0 (leave blank to auto-detect)"
        required: false
      sha256:
        description: "SHA256 of peek-v<version>.zip (leave blank to auto-detect)"
        required: false

permissions:
  contents: write

jobs:
  bump:
    name: Update Casks/peek.rb
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Resolve version + sha256
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
          DISPATCH_VERSION: ${{ github.event.client_payload.version }}
          DISPATCH_SHA256: ${{ github.event.client_payload.sha256 }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
          INPUT_SHA256: ${{ github.event.inputs.sha256 }}
        run: |
          set -euo pipefail
          VERSION="${DISPATCH_VERSION:-${INPUT_VERSION:-}}"
          SHA256="${DISPATCH_SHA256:-${INPUT_SHA256:-}}"

          if [ -z "$VERSION" ] || [ -z "$SHA256" ]; then
            echo "No explicit inputs; querying latest release of rsdrahat/peek..."
            TAG=$(gh release view --repo rsdrahat/peek --json tagName --jq .tagName)
            VERSION="${VERSION:-${TAG#v}}"
            if [ -z "$SHA256" ]; then
              SHA_ASSET="peek-${TAG}.zip.sha256"
              SHA_URL="https://github.com/rsdrahat/peek/releases/download/${TAG}/${SHA_ASSET}"
              SHA256=$(curl -fsSL "$SHA_URL" | cut -d' ' -f1)
            fi
          fi

          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ] || [ -z "$SHA256" ]; then
            echo "::error::could not resolve version or sha256"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "sha256=$SHA256"   >> "$GITHUB_OUTPUT"
          echo "Target: peek $VERSION ($SHA256)"

      - name: Rewrite Casks/peek.rb
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
          SHA256: ${{ steps.resolve.outputs.sha256 }}
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os, re, pathlib
          v = os.environ["VERSION"]
          s = os.environ["SHA256"]
          p = pathlib.Path("Casks/peek.rb")
          text = p.read_text()
          text = re.sub(r'version "[^"]+"',  f'version "{v}"',  text, count=1)
          text = re.sub(r'sha256 "[^"]+"',   f'sha256 "{s}"',   text, count=1)
          p.write_text(text)
          PY
          git diff -- Casks/peek.rb || true

      - name: Commit + push
        env:
          VERSION: ${{ steps.resolve.outputs.version }}
        run: |
          set -euo pipefail
          if git diff --quiet -- Casks/peek.rb; then
            echo "Cask already at $VERSION; nothing to do."
            exit 0
          fi
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/peek.rb
          git commit -m "cask: peek $VERSION"
          git push origin main
